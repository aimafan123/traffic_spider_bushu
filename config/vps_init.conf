# VPS 初始化统一配置
# 使用方式:
# 1) 复制为 config/vps_init.conf
# 2) 修改 HOSTNAMES / SSH_USER / IMAGE_FILENAME 等字段
# 3) 确保本机 /etc/hosts (或 HOSTS_FILE 指向的文件) 里有这些 hostname 的 IP 映射

# 必填: 按顺序填写要初始化的服务器 hostname。
# 第一个会被当成 SOURCE_SERVER。
HOSTNAMES=(
    "vv6"
    "vv7"
    "vv8"
    "vv9"
)

# 可选: SSH 登录用户
SSH_USER="root"

# 可选: 源服务器公钥路径 (供 init_vps.sh 使用)
PUBLIC_KEY_FILE="~/.ssh/id_ed25519.pub"

# 可选: 镜像文件名 (供 init_vps2.sh 使用)
IMAGE_FILENAME="single_spider_traffic_260319.tar"

# 可选: 本地镜像完整路径 (供 init_vps_all.sh 上传阶段使用)
# 默认: ${PROJECT_ROOT}/${IMAGE_FILENAME}
# LOCAL_IMAGE_PATH="/home/yourname/path/to/single_spider_traffic_260319.tar"

# 可选: hosts 文件路径，默认 /etc/hosts
HOSTS_FILE="/etc/hosts"

# 可选: SSH 参数 (供 init_vps.sh 使用)
SSH_OPTS="-o StrictHostKeyChecking=no -o ConnectTimeout=10"

# 可选: SSH 参数 (供 init_vps2.sh 使用)
SSH_OPTS_FAST="-o StrictHostKeyChecking=no -o ConnectTimeout=20 -o UserKnownHostsFile=/dev/null"

# 可选: 源服务器执行 rsync 时使用的 SSH 参数
# 默认关闭 host key 校验，避免初始化阶段因 known_hosts 冲突失败。
RSYNC_SSH_OPTS="-o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null -o ConnectTimeout=20"
